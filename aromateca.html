<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aromateca Digital</title>

    <link rel="stylesheet" href="styles.css?v=1.3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/bitmaks/cm-web-fonts@latest/fonts.css">
    <link href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="graph.js?v=1.3" defer></script>
</head>

<body>
    <div class="app">
        <header class="header">
            <h1>Aromateca Digital</h1>
        </header>

        <section class="gallery splide">
            <h2>Catálogo de itens</h2>
            <div id="gallery" class="splide__track gallery_container">
                <ul id="gallery_list" class="splide__list">
                </ul>
            </div>
        </section>

        <main class="main-content">
            <section class="graph-panel">
                <h2>Conexões</h2>

                <div id="graph">
                    <!-- d3 graph goes here -->
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label>Aresta</label>
                        <select id="edgeSelector"></select>
                    </div>

                    <div class="control-group">
                        <label>Nó</label>
                        <select id="sizeSelector"></select>
                    </div>
                </div>
            </section>

            <aside class="info-panel">
                <div class="info_header">
                    <h2 class="info_subtitle" id="info_subtitle" aria-live="polite"></h2>
                    <p class="cientific_name" id="cientific_name"></p>
                </div>
                <div class="info_content">
                    <div id="info_imgs"></div>

                    <div class="info_grid">
                        <span class="info_prop">Origem:</span>
                        <span id="origin" class="info_val"></span>

                        <span class="info_prop">Outros nomes:</span>
                        <span id="other_names" class="info_val"></span>

                        <span class="info_prop">Aplicabilidade:</span>
                        <span id="gastronomic_applications" class="info_val"></span>

                        <span class="info_prop">Preço:</span>
                        <span id="price" class="info_val"></span>
                    </div>

                    <hr />

                    <p id="description" class="description_text"></p>
                </div>

                <div class="info_tags_footer">
                    <div class="tags_row">
                        <span class="tags_label">Sabor:</span>
                        <div id="sabor_tags" class="sabor_tags"></div>
                    </div>
                    <div class="tags_row">
                        <span class="tags_label">Aroma:</span>
                        <div id="aroma_tags" class="aroma_tags"></div>
                    </div>
                </div>
            </aside>
        </main>
    </div>
</body>

</html>
